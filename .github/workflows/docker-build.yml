name: Build and Push Docker Image to ghcr.io

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build variables
        id: vars
        run: |
          echo "build_unix_time=$(date '+%s')" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date '+%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_PIPELINE=1
            BUILD_UNIXTIME=${{ steps.vars.outputs.build_unix_time }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            SKIP_TESTS=1
          tags: |
            ghcr.io/${{ github.repository_owner }}/ezbookkeeping-budget:latest
            ghcr.io/${{ github.repository_owner }}/ezbookkeeping-budget:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ezbookkeeping-budget:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ezbookkeeping-budget:buildcache,mode=max
